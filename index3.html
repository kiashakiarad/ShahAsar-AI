<!DOCTYPE html>
<html lang="fa">
<head>
  <meta charset="UTF-8">
  <title>ShahAsar AI</title>
  <style>
    body {
      font-family: sans-serif;
      background: #0f172a;
      color: white;
      text-align: center;
      padding: 20px;
    }

    #chat {
      width: 400px;
      margin: auto;
      background: #1e293b;
      padding: 15px;
      border-radius: 10px;
    }

    input {
      width: 80%;
      padding: 10px;
    }

    button {
      padding: 10px;
      cursor: pointer;
    }

    .msg {
      text-align: right;
      margin: 10px 0;
    }
  </style>
</head>

<body>

<h1>🤖 ShahAsar AI</h1>

<div id="chat"></div>

<input id="msg" placeholder="پیام بنویس...">
<button onclick="send()">ارسال</button>

<script>
async function send() {
  const input = document.getElementById("msg");
  const text = input.value;

  if (!text) return;

  const chat = document.getElementById("chat");

  chat.innerHTML += `<div class="msg">🧑 شما: ${text}</div>`;

  const res = await fetch("http://localhost:3000/chat", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ message: text })
  });

  const data = await res.json();

  chat.innerHTML += `<div class="msg">🤖 AI: ${data.reply}</div>`;

  input.value = "";
}
</script>

</body>
</html>
