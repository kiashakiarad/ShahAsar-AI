<!DOCTYPE html>
<html lang="fa">
<head>
  <meta charset="UTF-8">
  <title>ShahAsar AI</title>

  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background: #0f172a;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    h1 {
      margin: 20px;
    }

    #chat {
      width: 420px;
      height: 500px;
      background: #1e293b;
      padding: 15px;
      border-radius: 12px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .msg {
      padding: 10px;
      border-radius: 8px;
      max-width: 80%;
    }

    .user {
      background: #2563eb;
      align-self: flex-end;
    }

    .ai {
      background: #334155;
      align-self: flex-start;
    }

    .inputBox {
      margin-top: 10px;
      display: flex;
      width: 420px;
    }

    input {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 8px;
      outline: none;
    }

    button {
      margin-left: 8px;
      padding: 10px 15px;
      border: none;
      background: #22c55e;
      color: white;
      border-radius: 8px;
      cursor: pointer;
    }

    button:hover {
      background: #16a34a;
    }
  </style>
</head>

<body>

<h1>🤖 ShahAsar AI</h1>

<div id="chat"></div>

<div class="inputBox">
  <input id="msg" placeholder="پیام بنویس..." />
  <button onclick="send()">ارسال</button>
</div>

<script>
async function send() {
  const input = document.getElementById("msg");
  const text = input.value;

  if (!text) return;

  const chat = document.getElementById("chat");

  // پیام کاربر
  chat.innerHTML += `<div class="msg user">🧑 شما: ${text}</div>`;

  input.value = "";

  // درخواست به سرور
  const res = await fetch("https://shahasar-ai.onrender.com/chat", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ message: text })
  });

  const data = await res.json();

  // جواب AI
  chat.innerHTML += `<div class="msg ai">🤖 AI: ${data.reply}</div>`;

  chat.scrollTop = chat.scrollHeight;
}
</script>

</body>
</html>
